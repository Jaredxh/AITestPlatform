services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aitest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aitest123}
      POSTGRES_DB: ${POSTGRES_DB:-aitest_platform}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aitest}"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata_dev:
