services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aitest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aitest123}
      POSTGRES_DB: ${POSTGRES_DB:-aitest_platform}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aitest} -d ${POSTGRES_DB:-aitest_platform}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      # 与运行时代理分离：仅在 ``docker compose build`` 时传给 Dockerfile 的 ARG/ENV，
      # 解决部分网络下 ``deb.debian.org`` / Playwright ``--with-deps`` apt 超时。
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
        # 参见 backend/Dockerfile 顶注释：不换源时仅占位空字符串，行为与未加此参数一致
        APT_MIRROR_HOST: ${APT_MIRROR_HOST:-}
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-aitest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aitest123}
      POSTGRES_DB: ${POSTGRES_DB:-aitest_platform}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      # ⚠️ 故意不写 ``${ENCRYPT_KEY:-}`` 这种带空默认值：pydantic-settings 会
      # 把空串当成"用户显式覆盖"，吃掉 backend/app/config.py 里那条 dev 默认
      # Fernet key，启动后第一次保存 LLM 配置就抛 ``ValueError: Fernet key
      # must be 32 url-safe base64-encoded bytes`` → 500。
      #
      # 用 ``${ENCRYPT_KEY:?...}`` 强校验：没配置 / 配置成空 → 容器拒绝启动
      # 并打印明确报错，比"起来后偶发 500"好定位。
      #
      # 标准启动流程：``cp .env.example .env`` → ``docker compose up -d``。
      # .env.example 已经带了一把开箱即用的默认 key（仅适合内网/测试），
      # 想换成独立 key 见 .env.example 里 ENCRYPT_KEY 那段注释。
      ENCRYPT_KEY: ${ENCRYPT_KEY:?ENCRYPT_KEY 未配置：cp .env.example .env 后再 docker compose up -d，详见 .env.example 里 ENCRYPT_KEY 章节}
      # DEBUG 从 .env 读，默认 false（生产安全默认）
      # 本地开发想看 Swagger /docs / /redoc → .env 里设 DEBUG=true 然后 up -d backend
      DEBUG: ${DEBUG:-false}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@aitest.local}
      # ── 二期 UI 自动化（Task 11.3 集成）──────────────────────
      # snapshot_clipper 真的会读这两个；其余 UI_* 由 DB environment 列承载
      UI_SNAPSHOT_MAX_CHARS: ${UI_SNAPSHOT_MAX_CHARS:-3000}
      UI_SNAPSHOT_DIFF_CONTEXT: ${UI_SNAPSHOT_DIFF_CONTEXT:-2}
      # cleanup cron（Task 11.2）；间隔 0 关闭，run_on_startup 默认 false
      CLEANUP_INTERVAL_HOURS: ${CLEANUP_INTERVAL_HOURS:-24}
      CLEANUP_RUN_ON_STARTUP: ${CLEANUP_RUN_ON_STARTUP:-false}
      UI_MEDIA_RETENTION_DAYS: ${UI_MEDIA_RETENTION_DAYS:-30}
      UI_STATE_RETENTION_DAYS: ${UI_STATE_RETENTION_DAYS:-7}
      UI_SNAPSHOT_RETENTION_DAYS: ${UI_SNAPSHOT_RETENTION_DAYS:-7}
      TEST_DATA_FILE_RETENTION_DAYS: ${TEST_DATA_FILE_RETENTION_DAYS:-90}
      # http_login 专用旁路代理（VPN 场景下 auth_base_url 在公司内网时启用）。
      # 仅 http_login 走它；LLM 调用 / ai_login / state_inject 都不受影响。
      # 例：``UI_HTTP_LOGIN_PROXY=http://host.docker.internal:8118``。
      UI_HTTP_LOGIN_PROXY: ${UI_HTTP_LOGIN_PROXY:-}
      # 三期 Skill 包 ``http_get_json`` / ``http_post_json`` 出口代理（可选）。
      # 留空时按 ``UI_HTTP_LOGIN_PROXY`` → ``HTTP_PROXY`` 回退；想让"技能包 HTTP"
      # 与"二期 http_login"使用不同代理时再单独配置这一条。
      SKILL_HTTP_PROXY: ${SKILL_HTTP_PROXY:-}
      # chromium 出口代理（VPN 场景下"被测系统"在公司内网时启用）。
      # ``BrowserBundle`` 启动时把这条作为 ``--proxy-server`` 透传给 chromium，
      # 用例执行 / ai_login / state_inject 期间所有浏览器流量都走该代理。
      # 例：``UI_BROWSER_PROXY=http://host.docker.internal:8118``。
      UI_BROWSER_PROXY: ${UI_BROWSER_PROXY:-}
      # 不走代理的 host 列表（逗号分隔）。本地服务必须 bypass，否则 chromium
      # 经代理访问 ``localhost``/``host.docker.internal`` 会断。
      # 例：``localhost,127.0.0.1,host.docker.internal,db,backend,frontend``。
      UI_BROWSER_PROXY_BYPASS: ${UI_BROWSER_PROXY_BYPASS:-localhost,127.0.0.1,host.docker.internal,db,backend,frontend}
      # 有头浏览器远程观察栈（详见 backend/Dockerfile §6 + entrypoint.sh）。
      # 默认开启；想关时设 ``UI_NOVNC_ENABLED=false`` 即可（仍保留 Xvfb，
      # chromium 在 Xvfb 跑、但不暴露 VNC 端口）。
      UI_NOVNC_ENABLED: ${UI_NOVNC_ENABLED:-true}
      UI_NOVNC_PORT: ${UI_NOVNC_PORT:-6080}
      # ── 三期 ``run_skill_script`` 子进程资源闸（可调，env 覆盖）────────────
      # ⚠️ 这五条**必须**在 compose ``environment:`` 块显式声明：pydantic-settings
      # 在容器内只读 OS env，而 ``.env`` 文件并不会被 docker 自动塞进容器进程。
      # 不写这一段则 .env 改了五个 SKILL_SCRIPT_* 也是无效的。
      #
      # 默认值要能撑过 ``npx clawhub install`` / ``npm install`` / ``pip install``
      # 这种 OpenClaw 风格的"自启动安装"流程。详细推导见 ``app/config.py``
      # 内同名字段注释。
      SKILL_SCRIPT_TIMEOUT_S: ${SKILL_SCRIPT_TIMEOUT_S:-90}
      SKILL_SCRIPT_RLIMIT_CPU_S: ${SKILL_SCRIPT_RLIMIT_CPU_S:-60}
      SKILL_SCRIPT_RLIMIT_AS_MB: ${SKILL_SCRIPT_RLIMIT_AS_MB:-2048}
      SKILL_SCRIPT_RLIMIT_FSIZE_MB: ${SKILL_SCRIPT_RLIMIT_FSIZE_MB:-256}
      SKILL_SCRIPT_NODE_MAX_OLD_SPACE_MB: ${SKILL_SCRIPT_NODE_MAX_OLD_SPACE_MB:-1024}
    ports:
      # 宿主机端口可配置（容器内 uvicorn 监听 8000 不变）
      # 改方法：在 .env 写 BACKEND_PORT=7008（避免与服务器其它服务冲突）
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      # 一期：requirements 等文档（向后兼容旧部署的整目录卷）
      - backend_uploads:/app/uploads
      # 二期：拆分挂载，子路径覆盖父挂载里对应目录。这样 named volume 各自
      # 独立持久化，备份 / 重置 / 清理可以颗粒化。⚠️ 顺序很重要：父挂载在前
      # 子挂载在后，否则父挂载会覆盖子挂载。
      - test_data:/app/uploads/test-data
      - ui_artifacts:/app/uploads/ui_artifacts
      - ui_state:/app/uploads/ui_state
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["/app/entrypoint.sh"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    restart: unless-stopped
    ports:
      # 宿主机端口可配置（容器内 nginx 监听 80 不变）
      # 默认 80（浏览器访问 http://host 不需要带端口）
      # 服务器 80 已被占用 / 上游有 Caddy 反代时改成 ${FRONTEND_PORT:-8080}
      - "${FRONTEND_PORT:-80}:80"
    volumes:
      # nginx 通过 alias 直接读 ui_artifacts 卷（详见 frontend/nginx.conf）
      # ⚠️ 只读挂载：前端绝对不应该写媒体文件
      # ⚠️ 故意不挂 ui_state / test_data：登录态 + secret 元信息不应被前端容器接触
      - ui_artifacts:/app/uploads/ui_artifacts:ro
    depends_on:
      - backend

volumes:
  pgdata:
  backend_uploads:
  # 二期 UI 自动化 named volumes（Task 11.3）
  test_data:
  ui_artifacts:
  ui_state:
