server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Vue Router history mode
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── index.html 必须 no-cache ────────────────────────────────────
    # 静态资源（js/css/png/...）下面有 ``expires 1y; immutable`` 的规则——文件
    # 名带 vite hash 所以可以放心永久缓存。但是 ``index.html`` 不带 hash，里面
    # 嵌的是 ``<script src="/assets/ExecutionMonitor-XXXXXX.js">`` 的最新 chunk
    # 名字。如果它也被浏览器/中间层缓存，部署后用户会拿到旧 index.html 引用
    # 一个已被 nginx 删掉的 chunk → 要么白屏要么继续显示旧 UI（"我刚改完了
    # 怎么还是老样子"的常见诱因）。
    # 强制每次都问后端是否更新（304 ETag 命中时 body 也不传，几乎无成本）。
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    # API proxy (general)
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
        client_max_body_size 50m;
    }

    # SSE support for chat
    location /api/chat/ {
        proxy_pass http://backend:8000/api/chat/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
    }

    # SSE support for testcase generation
    location /api/testcases/ {
        proxy_pass http://backend:8000/api/testcases/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── 二期 UI 自动化媒体静态资源（Task 11.3）───────────────────────
    # ui_artifacts named volume 在 docker-compose 里以 :ro 挂到这个路径；
    # 视频 / trace / 截图 直接由 nginx 出，不走 backend 流式转发，省后端 IO。
    # 注意：路径以 / 结尾匹配前缀；alias 的目录也以 / 结尾，nginx 会把
    # /uploads/ui_artifacts/foo.webm → /app/uploads/ui_artifacts/foo.webm
    #
    # ⚠️ ``^~`` 前缀很关键：上面有 ``location ~* \.(...png|jpg...)`` 的正则
    # location，按 nginx 优先级正则会先于普通前缀匹配命中。``^~`` 让本
    # 前缀匹配优先级**高于**正则，否则截图 .png 请求会被正则 location 抢
    # 走，落到默认 root ``/usr/share/nginx/html`` 找不到文件 404。
    #
    # ⚠️ 反例：千万不要再加 /uploads/ui_state/ 或 /uploads/test-data/——
    #   ui_state 含登录 cookie；test-data 含 secret 元信息（虽然明文是密
    #   文，但泄漏文件名 / 大小依然是信息泄漏）。
    location ^~ /uploads/ui_artifacts/ {
        alias /app/uploads/ui_artifacts/;
        # 24h 缓存：执行 ID 是 immutable 的（同一 ID 不会换文件），但跨执行
        # 不共享文件名，所以不能 immutable，给 24h 是平衡
        add_header Cache-Control "public, max-age=86400";
        # video / trace 可能很大；不要被默认 buffering 拖慢
        sendfile on;
        tcp_nopush on;
        # 媒体文件不做 access_log 记录（视频流量大会刷爆日志）
        access_log off;
    }

    # ─── 有头浏览器实时画面（noVNC 反代）──────────────────────────────
    # 链路（详见 backend/Dockerfile §6）：
    #   chromium → Xvfb(:99) → x11vnc(127.0.0.1:5900) → websockify(:6080)
    #          ↓
    #     这里的 nginx 反代：把 ``/novnc/...`` 转给 backend:6080
    #          ↓
    #     前端 ExecutionMonitor 嵌 ``<iframe src="/novnc/vnc_lite.html?path=novnc/websockify&autoconnect=1&resize=remote">``
    #
    # ⚠️ ``^~`` 前缀同 ui_artifacts 的考虑：避免被上面的静态资源正则 location 抢走
    # ⚠️ websocket：HTTP 升级到 WS 必须设 Upgrade / Connection 头
    # ⚠️ 鉴权：本反代不强制 auth_request——画面经此 iframe 嵌在前端登录后的
    #    监控页里，``X-Frame-Options: SAMEORIGIN``（响应头底部已设）保证只有本
    #    站才能 iframe；外站拉这条 ws 流也没用（chromium 在容器内私网，拿到 ws
    #    URL 的人必须在本站登录态下才能从 nginx 进来）。如果以后要更严，加
    #    ``auth_request /api/auth/whoami;`` 即可。
    location ^~ /novnc/ {
        proxy_pass http://backend:6080/;
        proxy_http_version 1.1;
        # WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # 转 host & X-Forwarded
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 长连接 + 不缓冲：画面流必须 real-time，缓冲会卡顿
        proxy_buffering off;
        proxy_cache off;
        # 默认 60s read_timeout 会把空闲 WS 砍掉（"看一会儿没操作"就掉线）
        # 给 1h 让人类工作日内不被打断；超时后用户重新打开抽屉自动重连即可
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
